# cruzAlex Hyprland Configuration
# Modular config for Fedora Asahi and Arch Linux


# Force GTK to stop auto-scaling based on the monitor
env = GDK_SCALE,1
env = GTK_SCALE,1
env = GDK_DPI_SCALE,1.0  # Adjust this (0.5 to 0.8) until it looks right

# Tell Wayland apps to handle scaling themselves
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb

# Crucial for Ghostty/M1 Max:
env = WINIT_X11_SCALE_FACTOR,1

# Force GTK4 legacy GL renderer (replaces Ghostty's removed `renderer = opengl`).
# Fixes text-cell backgrounds going fully transparent under Hyprland window-opacity.
env = GSK_RENDERER,gl

# Source modular configs
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/webapps.conf

# Theme (linked by cruzalex-theme-set)
source = ~/.config/hypr/theme.conf

# Subtle-dim override — themes ship dim_strength=0.4 which makes the inactive
# side of a side-by-side terminal pair look washed out. 0.15 keeps the focus
# cue without crushing the unfocused window.
decoration {
    dim_strength = 0.15
    dim_around = 0.2
    dim_special = 0.2
}

# Monitor configuration
# For MacBook Pro 16" M1 Max (Asahi)
#monitor = ,preferred,auto,1.5

monitor = eDP-1, 3456x2160@120, 0x0, 1.5


# 2. TV Philips HDMI
# 4K @ 60Hz, posicionado à direita do Mac (auto), escala 1.5 (como você já estava usando)
# monitor = HDMI-A-1, 3840x2160@60, auto, 1.5



# General settings
#
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(ffc600)
    col.inactive_border = rgb(193549)
    layout = dwindle
    allow_tearing = false
}

# Decoration
decoration {
    rounding = 8

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        xray = false
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(00000055)
    }
}

# Animations
animations {
    enabled = true

    bezier = ease, 0.25, 0.1, 0.25, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1

    animation = windows, 1, 4, overshot, slide
    animation = windowsOut, 1, 4, ease, slide
    animation = fade, 1, 4, ease
    animation = workspaces, 1, 4, overshot, slide
    animation = border, 1, 5, ease
}

# Layouts
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

# Misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# XWayland
xwayland {
    force_zero_scaling = true
}





