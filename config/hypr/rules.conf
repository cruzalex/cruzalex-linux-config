# cruzAlex Hyprland Window Rules (v0.54.2 RECONSTRUCTED)

# ═══════════════════════════════════════════════════════════════
# Floating Windows (Requires "on" or "1")
# ═══════════════════════════════════════════════════════════════
windowrule = match:class ^(file-roller)$, float on
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(gnome-calculator)$, float on

# Picture-in-Picture
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, size 480 270

# Confirmation dialogs
windowrule = match:title ^(Confirm)(.*)$, float on
windowrule = match:title ^(Open File)$, float on
windowrule = match:title ^(Save As)$, float on

# ═══════════════════════════════════════════════════════════════
# Workspace Assignments
# ═══════════════════════════════════════════════════════════════
windowrule = match:class ^(chromium)$, workspace 2
windowrule = match:class ^(firefox)$, workspace 2
windowrule = match:class ^(code)$, workspace 3
windowrule = match:class ^(Code)$, workspace 3
windowrule = match:class ^(Slack)$, workspace 4
windowrule = match:class ^(discord)$, workspace 4
windowrule = match:class ^(Spotify)$, workspace 5

# ═══════════════════════════════════════════════════════════════
# Opacity (Ghostty & Kitty)
# ═══════════════════════════════════════════════════════════════
windowrule = match:class ^(com.mitchellh.ghostty)$, opacity 0.92 0.85
windowrule = match:class ^(kitty)$, opacity 0.82 0.78

# ═══════════════════════════════════════════════════════════════
# Web Apps & Special Rules
# ═══════════════════════════════════════════════════════════════
windowrule = match:title ^(YouTube)$, workspace 6
windowrule = match:title ^(YouTube)$, float on
windowrule = match:title ^(ChatGPT)$, workspace 7

# idleinhibit was REMOVED in 0.54. Removing to clear the red bar.
# windowrule = match:class ^.*$, idleinhibit focus

windowrule = match:class ^(chromium)$, no_blur on
