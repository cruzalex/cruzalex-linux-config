# cruzAlex Spotify Player Configuration
# TUI Spotify client

# IMPORTANT: Create your own Spotify app at https://developer.spotify.com/dashboard
# Set Redirect URI to: http://127.0.0.1:8989/login
# Then paste your Client ID below:
client_id = "e23b09f8f0ce462c9641268bab261fd9"
theme = "cruzalex"

# Force audio to stream through the local librespot device so the FFT
# visualizer has real PCM data to draw from. Without this, audio routed via
# Spotify Connect to another speaker would skip our backend entirely.
enable_streaming = "Always"
enable_audio_visualization = true

[device]
name = "cruzalex-spotify"
device_type = "computer"
volume = 70
bitrate = 320
audio_cache = true
normalization = false

[playback]
# Available backends: rodio, pulseaudio, alsa
# rodio works better with PipeWire on Fedora
backend = "rodio"
# Gapless playback
gapless = true

[layout]
playback_window_position = "Top"
playback_window_height = 12
library = { playlist_percent = 40, album_percent = 40 }

[keymaps]
# Movement (vim-style)
"j" = "SelectNextItem"
"k" = "SelectPreviousItem"
"g g" = "SelectFirstItem"
"G" = "SelectLastItem"
"ctrl+d" = "PageDown"
"ctrl+u" = "PageUp"

# Playback
"space" = "TogglePause"
"n" = "NextTrack"
"p" = "PreviousTrack"
">" = "SeekForward"
"<" = "SeekBackward"
"+" = "VolumeUp"
"-" = "VolumeDown"
"m" = "ToggleMute"
"s" = "ToggleShuffle"
"r" = "ToggleRepeat"

# Navigation
"enter" = "Play"
"backspace" = "Back"
"tab" = "FocusNextWindow"
"shift+tab" = "FocusPreviousWindow"
"/" = "Search"
"escape" = "ClosePopup"
"q" = "Quit"

# Actions
"l" = "AddToLibrary"
"L" = "RemoveFromLibrary"
"f" = "AddToQueue"
"F" = "AddToPlaylist"
"d" = "ShowDevices"
"?" = "ShowHelp"

[library]
# Library display options
default_view = "Playlists"

[search]
# Search options
default_search_type = "tracks"
limit = 50
